apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: register-app-alerts
  namespace: default
  labels:
    app: register-app
    release: monitoring
spec:
  groups:
    - name: register-app-alerts
      rules:

        # This alert ALWAYS fires — just to prove alerts are working
        - alert: RegisterAppTestAlert
          expr: vector(1)
          for: 10s
          labels:
            severity: info
          annotations:
            summary: "Test Alert - Register App monitoring is active"
            description: "This is a test alert to confirm alerting pipeline works."

        # Fires when ALL pods are down
        - alert: RegisterAppDown
          expr: kube_deployment_status_replicas_available{deployment="register-app-deployment"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Register App is DOWN"
            description: "No running pods for register-app-deployment."

        # Fires when pods keep restarting
        - alert: RegisterAppRestarting
          expr: increase(kube_pod_container_status_restarts_total{pod=~"register-app-deployment-.*"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Register App pod is restarting"
            description: "Pod {{ $labels.pod }} restarted in the last 5 minutes."
